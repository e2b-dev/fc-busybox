name: Build BusyBox

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: busybox-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          # Tag format: v1.36.1 or v1.36.1-20260401
          TAG="${GITHUB_REF_NAME}"
          # Extract busybox upstream version (everything before first dash after v)
          BUSYBOX_VERSION="${TAG#v}"
          BUSYBOX_VERSION="${BUSYBOX_VERSION%%-*}"
          echo "busybox_version=${BUSYBOX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building BusyBox ${BUSYBOX_VERSION} from tag ${TAG}"

      - name: Build
        run: sudo BUSYBOX_VERSION=${{ steps.version.outputs.busybox_version }} TARGET_ARCH=${{ matrix.arch }} ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: busybox_${{ steps.version.outputs.tag }}_${{ matrix.arch }}
          path: builds/${{ steps.version.outputs.busybox_version }}/${{ matrix.arch }}/busybox

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUSYBOX_VERSION="${TAG#v}"
          BUSYBOX_VERSION="${BUSYBOX_VERSION%%-*}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "busybox_version=${BUSYBOX_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare GCS upload
        run: |
          # Restructure to {version}/{arch}/busybox for GCS bucket layout
          VERSION="${{ steps.version.outputs.busybox_version }}"
          mkdir -p "gcs-upload/${VERSION}/amd64" "gcs-upload/${VERSION}/arm64"
          for dir in artifacts/busybox_*; do
            arch="${dir##*_}"
            cp "$dir/busybox" "gcs-upload/${VERSION}/${arch}/busybox"
            chmod +x "gcs-upload/${VERSION}/${arch}/busybox"
          done
          ls -laR gcs-upload/

      - name: Setup GCP auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: gcs-upload
          destination: ${{ vars.GCP_BUCKET_NAME }}/busybox
          gzip: false
          parent: false

      - name: Prepare GitHub release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir release
          for dir in artifacts/busybox_*; do
            arch="${dir##*_}"
            cp "$dir/busybox" "release/busybox_${TAG}_${arch}"
            chmod +x "release/busybox_${TAG}_${arch}"
          done
          cd release && sha256sum busybox_* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: BusyBox ${{ steps.version.outputs.tag }}
          body: |
            Minimal BusyBox static builds (musl) for E2B sandbox systeminit.

            | File | Arch |
            |------|------|
            | `busybox_${{ steps.version.outputs.tag }}_amd64` | x86-64 |
            | `busybox_${{ steps.version.outputs.tag }}_arm64` | aarch64 |

            Built with ~47 systeminit applets. See [`build.sh`](../../blob/main/build.sh) for config.
          files: release/*
